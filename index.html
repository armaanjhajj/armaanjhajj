    /* ASCII video (client-side render of a video, ASCILINE-style, B&W) */
    .ascii-video {

      display: flex;
      justify-content: center;
    }
    #ascii {

      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: clamp(4px, 0.95vw, 7px);
      line-height: 1;
      letter-spacing: 0;
      white-space: pre;
      color: var(--accent);
      background: #fff;
      user-select: none;
    }
    /* source video and sampling canvas are never shown directly */
    #src-video, #sampler { display: none; }

  <script>
    // ASCII video renderer (runs entirely in the browser, no backend).
    // To use your own clip, drop the file into the repo and change VIDEO_SRC.
    // Use an .mp4 (H.264) for best cross-browser support. Keep it short and small,
    // since it ships with the static site and autoplays muted on load.
    const VIDEO_SRC = 'images/videos/landing.mp4';
    const COLS = 110;          // horizontal resolution in characters
    const CHAR_ASPECT = 0.5;   // characters are ~2x taller than wide
    const RAMP = ' .:-=+*#%@'; // light to dark (white bg, so space = bright)

    (function () {
      const out = document.getElementById('ascii');
      const video = document.getElementById('src-video');
      const sampler = document.getElementById('sampler');
      const ctx = sampler.getContext('2d', { willReadFrequently: true });

      let rows = 0;
      function fit() {
        if (!video.videoWidth) return;
        rows = Math.max(1, Math.round(COLS * (video.videoHeight / video.videoWidth) * CHAR_ASPECT));
        sampler.width = COLS;
        sampler.height = rows;
      }

      function frame() {
        if (video.readyState >= 2 && video.videoWidth) {
          if (sampler.width !== COLS || !rows) fit();
          ctx.drawImage(video, 0, 0, COLS, rows);
          const data = ctx.getImageData(0, 0, COLS, rows).data;
          let s = '';
          for (let y = 0; y < rows; y++) {
            for (let x = 0; x < COLS; x++) {
              const i = (y * COLS + x) * 4;
              // perceptual luminance, 0 (dark) .. 255 (light)
              const lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
              const idx = Math.round((1 - lum / 255) * (RAMP.length - 1));
              s += RAMP[idx];
            }
            s += '\n';
          }
          out.textContent = s;
        }
        requestAnimationFrame(frame);
      }

      video.src = VIDEO_SRC;
      // some browsers need an explicit play() after a user-less autoplay attempt
      video.addEventListener('loadeddata', () => { fit(); video.play().catch(() => {}); });
      requestAnimationFrame(frame);
    })();

    // NYC clock with zone abbreviation
    const nycEl = document.getElementById('nyc-time');
    function formatNYCTime() {
      const now = new Date();
      const fmt = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        hour: 'numeric', minute: '2-digit', second: '2-digit',
        hour12: true, timeZoneName: 'short'
      });
      // Result like: 11:04:21 AM EDT
      const parts = fmt.format(now).toLowerCase();
      nycEl.textContent = `time in new york city, ${parts.replace('edt', 'est')}`;
    }
    formatNYCTime();
    setInterval(formatNYCTime, 1000);
  </script>
