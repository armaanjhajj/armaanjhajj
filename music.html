<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>music – armaan jhajj</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/9vZBHkB.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --text:#111; --muted:#888; --accent:#111; --count:#4b2ca0; --line:#eee; }
    * { box-sizing: border-box; }
    body {
      margin:0; background:#fff; color:var(--text);
      font-family:'Playfair Display', Georgia, serif;
      -webkit-font-smoothing:antialiased;
    }
    main { max-width:1100px; margin:0 auto; padding:3rem 1.25rem 6rem; }

    .head { text-align:center; margin-bottom:2rem; }
    h1 { margin:0; font-style:italic; font-size:clamp(2rem,5vw,3rem); font-weight:400; }
    .count { color:var(--text); margin-top:.5rem; font-size:1.15rem; }
    .count b { font-weight:700; color:var(--count); }

    /* ---- toolbar ---- */
    .toolbar { display:flex; flex-wrap:wrap; gap:.75rem; align-items:center; justify-content:center; margin-bottom:1.25rem; }
    .search { position:relative; flex:1 1 280px; max-width:420px; }
    .search input {
      width:100%; padding:.6rem .9rem .6rem 2.2rem; font-family:inherit; font-size:1rem;
      border:1px solid #ccc; background:#fff; color:var(--text); outline:none;
      transition:border-color .2s;
    }
    .search input:focus { border-color:var(--accent); }
    .search svg { position:absolute; left:.7rem; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--muted); }

    select.sort {
      padding:.6rem .8rem; font-family:inherit; font-size:.95rem; border:1px solid #ccc;
      background:#fff; color:var(--text); cursor:pointer; outline:none; appearance:none;
    }
    select.sort:focus { border-color:var(--accent); }

    .views { display:flex; gap:.25rem; }
    .views button {
      border:1px solid #ccc; background:#fff; color:var(--muted); cursor:pointer;
      width:38px; height:38px; display:flex; align-items:center; justify-content:center;
      font-family:inherit; font-size:.9rem; transition:all .15s;
    }
    .views button:hover { border-color:var(--accent); color:var(--accent); }
    .views button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .views button svg { width:18px; height:18px; }

    .filter-toggle {
      border:1px solid #ccc; background:#fff; color:var(--text); cursor:pointer;
      padding:.6rem 1rem; font-family:inherit; font-size:.95rem; transition:all .15s;
      display:flex; align-items:center; gap:.4rem;
    }
    .filter-toggle:hover { border-color:var(--accent); color:var(--accent); }
    .filter-toggle.on { background:var(--accent); color:#fff; border-color:var(--accent); }
    .filter-toggle .badge { background:#fff; color:var(--accent); padding:0 .4rem; font-size:.75rem; font-weight:700; }

    /* ---- filter panel ---- */
    .filters { display:none; border:1px solid var(--line); padding:1rem 1.25rem; margin-bottom:1.5rem; }
    .filters.open { display:block; }
    .fgroup { margin-bottom:1rem; }
    .fgroup:last-child { margin-bottom:0; }
    .fgroup h4 { margin:0 0 .5rem; font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:600; }
    .chips { display:flex; flex-wrap:wrap; gap:.4rem; }
    .chip {
      border:1px solid #ddd; background:#fafafa; color:#444; cursor:pointer;
      padding:.28rem .7rem; font-family:inherit; font-size:.85rem; transition:all .15s;
    }
    .chip:hover { border-color:var(--accent); color:var(--accent); }
    .chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .clear-filters { margin-top:1rem; background:none; border:none; color:var(--text); cursor:pointer; font-family:inherit; font-size:.9rem; text-decoration:underline; padding:0; }

    /* ---- grid ---- */
    .grid { display:grid; gap:1.25rem; grid-template-columns:repeat(var(--cols,3),minmax(0,1fr)); }
    .grid[data-view="g3"] { --cols:3; }
    .grid[data-view="g9"] { --cols:9; gap:.6rem; }
    .grid[data-view="wall"] { grid-template-columns:repeat(auto-fill,minmax(56px,1fr)); gap:.4rem; }
    /* dense modes: covers only, no text or hover play button */
    .grid[data-view="g9"] .meta, .grid[data-view="wall"] .meta,
    .grid[data-view="g9"] .play-mini, .grid[data-view="wall"] .play-mini { display:none; }
    .grid[data-view="g9"] .num, .grid[data-view="wall"] .num { font-size:.6rem; padding:.05rem .25rem; top:.25rem; left:.25rem; }
    @media(max-width:900px){ .grid[data-view="g9"]{ --cols:6; } }
    @media(max-width:620px){ .grid[data-view="g3"]{ --cols:2; } .grid[data-view="g9"]{ --cols:4; } }

    .card { cursor:pointer; position:relative; min-width:0; }
    .card .art { position:relative; width:100%; aspect-ratio:1; overflow:hidden; background:#f2f2f2; }
    .card .art img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .35s ease; }
    .card:hover .art img { transform:scale(1.05); }
    /* number badges stay hidden on cards; the number shows in the modal on click */
    .card .num {
      display:none;
      position:absolute; top:.5rem; left:.5rem; background:rgba(0,0,0,.65); color:#fff;
      font-size:.72rem; font-weight:600; padding:.12rem .4rem; backdrop-filter:blur(2px);
    }
    .card .play-mini {
      position:absolute; bottom:.5rem; right:.5rem; width:34px; height:34px;
      background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center;
      opacity:0; transform:translateY(6px); transition:all .2s; box-shadow:0 4px 10px rgba(0,0,0,.25);
    }
    .card:hover .play-mini { opacity:1; transform:translateY(0); }
    .card .play-mini svg { width:15px; height:15px; }
    .card .meta { margin-top:.55rem; }
    .card .t { font-size:.98rem; line-height:1.25; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .card .a { font-size:.85rem; color:var(--muted); font-style:italic; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* ---- dense list view ---- */
    .grid[data-view="list"] { display:flex; flex-direction:column; gap:0; }
    .grid[data-view="list"] .card { display:flex; align-items:center; gap:.9rem; padding:.55rem .4rem; border-bottom:1px solid var(--line); }
    .grid[data-view="list"] .card:hover { background:#f6f6f6; }
    .grid[data-view="list"] .art { width:46px; height:46px; flex:0 0 46px; aspect-ratio:auto; }
    .grid[data-view="list"] .card:hover .art img { transform:none; }
    .grid[data-view="list"] .num { position:static; background:none; color:var(--muted); width:2rem; text-align:right; flex:0 0 auto; padding:0; }
    .grid[data-view="list"] .play-mini { display:none; }
    .grid[data-view="list"] .meta { margin-top:0; flex:1; min-width:0; display:flex; flex-direction:column; }
    .grid[data-view="list"] .list-extra { color:var(--muted); font-size:.85rem; font-style:italic; flex:0 0 auto; padding-right:.5rem; }
    .list-num-cell { display:none; }
    .grid[data-view="list"] .list-num-cell { display:none; }
    .grid:not([data-view="list"]) .list-extra { display:none; }

    .empty { text-align:center; color:var(--muted); font-style:italic; padding:3rem 0; }

    /* ---- modal ---- */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:100; padding:1.25rem; overflow-y:auto; }
    .overlay.open { display:flex; align-items:flex-start; justify-content:center; }
    .modal {
      background:#fff; border:1px solid #111; max-width:560px; width:100%; margin:auto;
      padding:1.75rem; position:relative; animation:pop .2s ease;
    }
    @keyframes pop { from{ transform:scale(.97); opacity:0; } to{ transform:scale(1); opacity:1; } }
    .modal-close { position:absolute; top:.8rem; right:1rem; background:none; border:none; font-size:1.6rem; cursor:pointer; color:var(--muted); line-height:1; }
    .modal-close:hover { color:var(--text); }
    .m-top { display:flex; gap:1.25rem; align-items:flex-start; }
    .m-art { width:140px; height:140px; flex:0 0 140px; overflow:hidden; background:#f2f2f2; }
    .m-art img { width:100%; height:100%; object-fit:cover; display:block; }
    .m-head { flex:1; min-width:0; }
    .m-num { color:var(--muted); font-style:italic; font-size:.9rem; }
    .m-title { font-size:1.5rem; line-height:1.2; margin:.15rem 0 .2rem; }
    .m-artist { color:#444; font-style:italic; }
    .m-album { color:var(--muted); font-size:.9rem; margin-top:.3rem; }
    .m-dur { color:var(--muted); font-size:.85rem; margin-top:.15rem; }

    .m-tags { display:flex; flex-wrap:wrap; gap:.4rem; margin:1.1rem 0; }
    .m-tag { font-size:.78rem; padding:.2rem .6rem; border:1px solid #ccc; background:#fff; color:#444; }
    .m-tag.cat { background:#111; color:#fff; border-color:#111; }

    .m-desc { line-height:1.65; color:#333; font-size:1rem; margin:0 0 1.2rem; }

    /* player */
    .player { display:flex; align-items:center; gap:.8rem; margin:0 0 1.25rem; padding:.7rem .8rem; border:1px solid var(--line); }
    .player button.pp {
      width:42px; height:42px; flex:0 0 42px; border:none; background:var(--accent); color:#fff;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
    .player button.pp:disabled { background:#bbb; cursor:wait; }
    .player .pp svg { width:16px; height:16px; }
    .player .bar-wrap { flex:1; }
    .player .bar { height:5px; background:#eee; overflow:hidden; cursor:pointer; }
    .player .bar .fill { height:100%; width:0; background:var(--accent); }
    .player .ptime { font-size:.75rem; color:var(--muted); margin-top:.3rem; }
    .player .note { font-size:.75rem; color:var(--muted); font-style:italic; }

    .m-links { display:flex; flex-wrap:wrap; gap:.6rem; }
    .m-links a {
      display:inline-flex; align-items:center; gap:.4rem; text-decoration:none;
      border:1px solid #ddd; padding:.5rem .9rem; font-size:.9rem; color:var(--text); transition:all .15s;
    }
    .m-links a:hover { border-color:var(--accent); color:var(--accent); }
    .m-links svg { width:15px; height:15px; }

    /* ---- thoughts (public, supabase-backed) ---- */
    .thoughts { margin-top:1.5rem; border-top:1px solid var(--line); padding-top:1.25rem; }
    .th-title { margin:0 0 .8rem; font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:600; }
    .th-list { display:flex; flex-direction:column; gap:.9rem; margin-bottom:1.3rem; }
    .th-item { border-left:2px solid #111; padding-left:.75rem; }
    .th-item .who { font-weight:700; font-size:.9rem; }
    .th-item .when { color:var(--muted); font-size:.72rem; font-style:italic; margin-left:.45rem; }
    .th-item .what { margin-top:.15rem; line-height:1.5; color:#333; font-size:.95rem; white-space:pre-wrap; word-break:break-word; }
    .th-empty { color:var(--muted); font-style:italic; font-size:.9rem; }
    .th-form { display:flex; flex-direction:column; gap:.6rem; }
    .th-name, .th-text { width:100%; padding:.55rem .7rem; border:1px solid #ccc; font-family:inherit; font-size:.95rem; background:#fff; color:var(--text); outline:none; transition:border-color .2s; }
    .th-name:focus, .th-text:focus { border-color:#111; }
    .th-text { resize:vertical; min-height:64px; }
    .th-submit { align-self:flex-start; background:#111; color:#fff; border:none; padding:.55rem 1.2rem; font-family:inherit; font-size:.9rem; cursor:pointer; transition:background .15s; }
    .th-submit:hover { background:#444; }
    .th-submit:disabled { background:#999; cursor:wait; }
    .th-msg { font-size:.8rem; font-style:italic; color:var(--muted); }

    nav.bottom { text-align:center; margin-top:3rem; }
    nav.bottom a { color:var(--text); text-decoration:underline; }

    @media(max-width:480px){
      .m-top { flex-direction:column; align-items:center; text-align:center; }
      .m-tags { justify-content:center; }
    }
  </style>
</head>
<body>
  <main>
    <div class="head">
      <h1>music</h1>
      <div class="count"><b id="total">0</b> songs</div>
    </div>

    <div class="toolbar">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search" type="text" placeholder="search songs, artists, albums…" autocomplete="off">
      </div>
      <select id="sort" class="sort">
        <option value="num">order added ↑</option>
        <option value="newest">newest first</option>
        <option value="title">title A–Z</option>
        <option value="artist">artist A–Z</option>
      </select>
      <button id="filterToggle" class="filter-toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        filters <span class="badge" id="filterCount" style="display:none">0</span>
      </button>
      <div class="views" id="views"></div>
    </div>

    <div class="filters" id="filters"></div>

    <div class="grid" id="grid" data-view="wall"></div>
    <div class="empty" id="empty" style="display:none">no songs match. try clearing filters or your search.</div>

    <nav class="bottom"><a href="/">home</a></nav>
  </main>

  <div class="overlay" id="overlay">
    <div class="modal" id="modal"></div>
  </div>

  <script src="/music-data.js"></script>
  <script>
  (function(){
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const searchEl = document.getElementById('search');
    const sortEl = document.getElementById('sort');
    const filtersEl = document.getElementById('filters');
    const filterToggle = document.getElementById('filterToggle');
    const filterCount = document.getElementById('filterCount');
    document.getElementById('total').textContent = SONGS.length;

    // ---------- build filter panel ----------
    const CATS = [
      { key:'genre',       label:'Genre',       get:s => [s.genre] },
      { key:'mood',        label:'Mood',        get:s => s.mood || [] },
      { key:'vibe',        label:'Vibe',        get:s => s.vibe || [] },
      { key:'nationality', label:'Nationality', get:s => [s.nationality] },
      { key:'artist',      label:'Artist',      get:s => s.artist.split(',').map(a=>a.trim()) },
    ];
    const active = {}; // key -> Set of values
    CATS.forEach(c => active[c.key] = new Set());

    CATS.forEach(cat => {
      const values = new Set();
      SONGS.forEach(s => cat.get(s).forEach(v => v && values.add(v)));
      if (!values.size) return;
      const wrap = document.createElement('div');
      wrap.className = 'fgroup';
      const h = document.createElement('h4'); h.textContent = cat.label; wrap.appendChild(h);
      const chips = document.createElement('div'); chips.className = 'chips';
      [...values].sort((a,b)=>a.localeCompare(b)).forEach(v => {
        const b = document.createElement('button');
        b.className = 'chip'; b.textContent = v;
        b.onclick = () => {
          if (active[cat.key].has(v)) { active[cat.key].delete(v); b.classList.remove('active'); }
          else { active[cat.key].add(v); b.classList.add('active'); }
          render();
        };
        b.dataset.cat = cat.key; b.dataset.val = v;
        chips.appendChild(b);
      });
      wrap.appendChild(chips);
      filtersEl.appendChild(wrap);
    });
    const clearBtn = document.createElement('button');
    clearBtn.className = 'clear-filters'; clearBtn.textContent = 'clear all filters';
    clearBtn.onclick = () => {
      CATS.forEach(c => active[c.key].clear());
      filtersEl.querySelectorAll('.chip.active').forEach(c => c.classList.remove('active'));
      render();
    };
    filtersEl.appendChild(clearBtn);

    filterToggle.onclick = () => {
      const open = filtersEl.classList.toggle('open');
      filterToggle.classList.toggle('on', open);
    };

    // ---------- view switching ----------
    const viewsEl = document.getElementById('views');
    // an n×n grid of squares, drawn so denser options literally look denser
    function gridIcon(n){
      const vb = 24, step = vb/n, sz = step*0.62, off = (step-sz)/2;
      let r = '';
      for (let y=0;y<n;y++) for (let x=0;x<n;x++)
        r += `<rect x="${(x*step+off).toFixed(2)}" y="${(y*step+off).toFixed(2)}" width="${sz.toFixed(2)}" height="${sz.toFixed(2)}"/>`;
      return `<svg viewBox="0 0 24 24" fill="currentColor">${r}</svg>`;
    }
    const LIST_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>';
    const VIEWS = [
      { v:'list', title:'list',        icon: LIST_ICON },
      { v:'g3',   title:'3 per row',   icon: gridIcon(3) },
      { v:'g9',   title:'9 per row',   icon: gridIcon(5) },
      { v:'wall', title:'wall',        icon: gridIcon(8) },
    ];
    VIEWS.forEach(o => {
      const b = document.createElement('button');
      b.dataset.view = o.v; b.title = o.title; b.innerHTML = o.icon;
      if (o.v === grid.dataset.view) b.classList.add('active');
      viewsEl.appendChild(b);
    });
    viewsEl.addEventListener('click', e => {
      const btn = e.target.closest('button'); if (!btn) return;
      viewsEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      grid.dataset.view = btn.dataset.view;
    });

    // ---------- filtering + rendering ----------
    function matches(s) {
      const q = searchEl.value.trim().toLowerCase();
      if (q) {
        const hay = [s.title, s.artist, s.album, s.genre, s.nationality, ...(s.mood||[]), ...(s.vibe||[])].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      for (const cat of CATS) {
        const sel = active[cat.key];
        if (sel.size === 0) continue;
        const vals = cat.get(s);
        if (![...sel].some(v => vals.includes(v))) return false;
      }
      return true;
    }

    function sortList(list) {
      const v = sortEl.value;
      const c = [...list];
      if (v === 'num') c.sort((a,b)=>a.n-b.n);
      else if (v === 'newest') c.sort((a,b)=>b.n-a.n);
      else if (v === 'title') c.sort((a,b)=>a.title.localeCompare(b.title));
      else if (v === 'artist') c.sort((a,b)=>a.artist.localeCompare(b.artist));
      return c;
    }

    function fmt(sec){ const m=Math.floor(sec/60), s=sec%60; return m+':'+String(s).padStart(2,'0'); }

    function render() {
      const n = CATS.reduce((acc,c)=>acc+active[c.key].size,0);
      filterCount.textContent = n;
      filterCount.style.display = n ? 'inline-block' : 'none';
      filterToggle.classList.toggle('on', n>0 || filtersEl.classList.contains('open'));

      const list = sortList(SONGS.filter(matches));
      grid.innerHTML = '';
      empty.style.display = list.length ? 'none' : 'block';
      list.forEach(s => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <span class="list-num-cell">${s.n}</span>
          <div class="art">
            <img loading="lazy" src="${s.coverSmall}" alt="${esc(s.title)} cover">
            <span class="num">#${s.n}</span>
            <span class="play-mini" aria-label="preview">${ICON_PLAY}</span>
          </div>
          <div class="meta">
            <div class="t">${esc(s.title)}</div>
            <div class="a">${esc(s.artist)}</div>
          </div>
          <span class="list-extra">${esc(s.genre)} · ${fmt(s.duration)}</span>`;
        card.onclick = () => openModal(s);
        grid.appendChild(card);
      });
    }

    searchEl.addEventListener('input', render);
    sortEl.addEventListener('change', render);

    // ---------- audio (shared, Deezer JSONP for fresh preview urls) ----------
    const audio = new Audio();
    const previewCache = {};
    let jsonpN = 0;
    function getPreview(id){
      if (previewCache[id]) return Promise.resolve(previewCache[id]);
      return new Promise((resolve,reject) => {
        const cb = 'dz_'+id+'_'+(jsonpN++);
        const sc = document.createElement('script');
        const t = setTimeout(()=>{ cleanup(); reject(new Error('timeout')); }, 8000);
        function cleanup(){ clearTimeout(t); delete window[cb]; sc.remove(); }
        window[cb] = data => { cleanup(); if(data && data.preview){ previewCache[id]=data.preview; resolve(data.preview);} else reject(new Error('no preview')); };
        sc.onerror = () => { cleanup(); reject(new Error('script error')); };
        sc.src = `https://api.deezer.com/track/${id}?output=jsonp&callback=${cb}`;
        document.body.appendChild(sc);
      });
    }

    // ---------- modal ----------
    const overlay = document.getElementById('overlay');
    const modal = document.getElementById('modal');

    function openModal(s){
      audio.pause();
      const tags = [
        `<span class="m-tag cat">${esc(s.genre)}</span>`,
        s.nationality && s.nationality!=='Unknown' ? `<span class="m-tag cat">${esc(s.nationality)}</span>` : '',
        ...(s.mood||[]).map(m=>`<span class="m-tag">${esc(m)}</span>`),
        ...(s.vibe||[]).map(v=>`<span class="m-tag">${esc(v)}</span>`),
      ].filter(Boolean).join('');

      modal.innerHTML = `
        <button class="modal-close" aria-label="close">&times;</button>
        <div class="m-top">
          <div class="m-art"><img src="${s.cover}" alt="${esc(s.title)} cover"></div>
          <div class="m-head">
            <div class="m-num">#${s.n} · added ${ordinal(s.n)}</div>
            <div class="m-title">${esc(s.title)}</div>
            <div class="m-artist">${esc(s.artist)}</div>
            <div class="m-album">${esc(s.album)}</div>
            <div class="m-dur">${fmt(s.duration)}</div>
          </div>
        </div>
        <div class="m-tags">${tags}</div>
        <div class="player">
          <button class="pp" disabled>${ICON_PLAY}</button>
          <div class="bar-wrap">
            <div class="bar"><div class="fill"></div></div>
            <div class="ptime"><span class="cur">0:00</span><span class="note"></span></div>
          </div>
        </div>
        <div class="m-links">
          <a href="${s.spotify}" target="_blank" rel="noopener">${ICON_SPOTIFY} Spotify</a>
          <a href="${s.apple}" target="_blank" rel="noopener">${ICON_APPLE} Apple Music</a>
        </div>
        <div class="thoughts">
          <h4 class="th-title">thoughts</h4>
          <div class="th-list" id="th-list"><div class="th-empty">loading thoughts</div></div>
          <form class="th-form" id="th-form" autocomplete="off">
            <input class="th-name" maxlength="80" placeholder="your name" required>
            <textarea class="th-text" maxlength="2000" placeholder="leave a thought on this song" required></textarea>
            <button type="submit" class="th-submit">add thought</button>
            <span class="th-msg" id="th-msg"></span>
          </form>
        </div>`;

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      setupPlayer(s);
      setupThoughts(s);
    }

    function setupPlayer(s){
      const pp = modal.querySelector('.pp');
      const fill = modal.querySelector('.fill');
      const bar = modal.querySelector('.bar');
      const cur = modal.querySelector('.cur');
      let loaded = false, playing = false;

      function setIcon(){ pp.innerHTML = playing ? ICON_PAUSE : ICON_PLAY; }

      async function ensure(){
        if (loaded) return true;
        pp.disabled = true;
        try {
          const url = await getPreview(s.deezerId);
          audio.src = url; loaded = true; pp.disabled = false; return true;
        } catch {
          pp.disabled = false;
          modal.querySelector('.note').textContent = '· preview unavailable';
          return false;
        }
      }

      pp.disabled = false;
      pp.onclick = async () => {
        if (playing) { audio.pause(); return; }
        if (!(await ensure())) return;
        audio.play();
      };

      audio.onplay = () => { playing = true; setIcon(); };
      audio.onpause = () => { playing = false; setIcon(); };
      audio.ontimeupdate = () => {
        if (!audio.duration) return;
        fill.style.width = (audio.currentTime/audio.duration*100)+'%';
        cur.textContent = fmt(Math.floor(audio.currentTime));
      };
      audio.onended = () => { fill.style.width='0%'; cur.textContent='0:00'; };
      bar.onclick = e => {
        if (!audio.duration) return;
        const r = bar.getBoundingClientRect();
        audio.currentTime = ((e.clientX-r.left)/r.width)*audio.duration;
      };
      setIcon();
    }

    // ---------- thoughts (public guestbook per song, via Supabase) ----------
    const SUPABASE_URL = 'https://wbcbhynnxuwgoispuvlu.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_F9vyAnM8MXL13RcZmEt10Q_WGwFl_dF';
    const SB_HEADERS = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };
    // stable per-song id that survives reordering/renumbering
    function songKey(s){ return (s.title + '-' + s.artist).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
    function fmtDate(iso){ try { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch { return ''; } }

    function renderThoughts(el, rows){
      if (!rows.length){ el.innerHTML = '<div class="th-empty">no thoughts yet. be the first.</div>'; return; }
      el.innerHTML = rows.map(r =>
        `<div class="th-item"><span class="who">${esc(r.name)}</span><span class="when">${fmtDate(r.created_at)}</span><div class="what">${esc(r.thought)}</div></div>`
      ).join('');
    }

    function setupThoughts(s){
      const key = songKey(s);
      const listEl = modal.querySelector('#th-list');
      const form = modal.querySelector('#th-form');
      const nameEl = form.querySelector('.th-name');
      const textEl = form.querySelector('.th-text');
      const btn = form.querySelector('.th-submit');
      const msg = modal.querySelector('#th-msg');

      async function load(){
        try {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/song_thoughts?song_key=eq.${encodeURIComponent(key)}&select=name,thought,created_at&order=created_at.desc`, { headers: SB_HEADERS });
          if (!res.ok) throw new Error();
          renderThoughts(listEl, await res.json());
        } catch { listEl.innerHTML = '<div class="th-empty">could not load thoughts.</div>'; }
      }

      form.onsubmit = async e => {
        e.preventDefault();
        const name = nameEl.value.trim(), thought = textEl.value.trim();
        if (!name || !thought) return;
        btn.disabled = true; msg.textContent = '';
        try {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/song_thoughts`, {
            method: 'POST',
            headers: { ...SB_HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
            body: JSON.stringify({ song_key: key, name, thought }),
          });
          if (!res.ok) throw new Error();
          form.reset(); msg.textContent = 'added.'; load();
        } catch { msg.textContent = 'something went wrong. try again.'; }
        finally { btn.disabled = false; }
      };

      load();
    }

    function closeModal(){
      audio.pause(); audio.onplay=audio.onpause=audio.ontimeupdate=audio.onended=null;
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('click', e => { if (e.target.closest('.modal-close')) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal(); });

    // ---------- helpers ----------
    function esc(str){ return String(str).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    function ordinal(n){ const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }

    const ICON_PLAY = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    const ICON_PAUSE = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';
    const ICON_SPOTIFY = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.42 1.56-.299.421-1.02.599-1.56.3z"/></svg>';
    const ICON_APPLE = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.564 12.6c-.024-2.69 2.196-3.98 2.296-4.043-1.252-1.83-3.196-2.08-3.886-2.107-1.654-.168-3.23.973-4.07.973-.838 0-2.132-.948-3.51-.922-1.806.027-3.474 1.05-4.402 2.668-1.878 3.255-.48 8.072 1.347 10.715.893 1.295 1.957 2.748 3.35 2.696 1.345-.054 1.852-.87 3.477-.87 1.624 0 2.082.87 3.502.843 1.447-.026 2.363-1.32 3.247-2.62 1.023-1.504 1.444-2.96 1.468-3.035-.032-.014-2.815-1.08-2.843-4.28zM14.95 4.78c.742-.9 1.243-2.15 1.106-3.396-1.07.044-2.366.713-3.133 1.612-.688.797-1.29 2.07-1.128 3.292 1.193.093 2.413-.607 3.155-1.508z"/></svg>';
    const ICON_NOTE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';

    render();
  })();
  </script>
</body>
</html>
